name: release

# Publish @rtrentjones/greenlight to npm via OIDC Trusted Publishing — no NPM_TOKEN.
# It's the single published package (the framework libs are bundled into its dist; keepalive
# is a Terraform-only Worker). Configure this repo + workflow as the package's trusted
# publisher on npmjs.com (Settings → Trusted Publisher: org RTrentJones, repo greenlight,
# workflow release.yml). Trigger manually, or by pushing a v* tag.
on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  id-token: write # OIDC token for trusted publishing (+ auto-provenance)
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2 # Node 24 (>= 22.14) + pnpm per mise.toml
      - name: Ensure npm >= 11.5.1 (trusted publishing)
        run: npm install -g npm@latest && npm --version
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:packages # tsup bundles shared/verify/adapters/loop into cli/dist
      - name: Pack the CLI (pnpm resolves workspace deps in the tarball)
        run: (cd cli && pnpm pack --pack-destination "$RUNNER_TEMP/dist")
      - name: Publish via OIDC trusted publishing
        run: npm publish "$RUNNER_TEMP"/dist/rtrentjones-greenlight-*.tgz --access public
