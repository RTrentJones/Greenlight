name: ci

on:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Installs node + pnpm from mise.toml — single source of truth with local dev.
      - uses: jdx/mise-action@v2

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Seam check (no personal data in framework files)
        run: pnpm check-seam

      - name: Boundary check (consumer -> framework only)
        run: pnpm check-boundaries
