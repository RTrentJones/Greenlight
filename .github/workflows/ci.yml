name: ci

on:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Installs node + pnpm from mise.toml — single source of truth with local dev.
      - uses: jdx/mise-action@v2

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Seam check (no personal data in framework files)
        run: pnpm check-seam

      - name: Boundary check (consumer -> framework only)
        run: pnpm check-boundaries

  infra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.6"

      - name: Format
        run: terraform fmt -check -recursive infra

      - name: Init + validate
        working-directory: infra/examples/single-tool
        run: |
          terraform init -backend=false
          terraform validate

      - name: Test (mock providers — no creds, no resources)
        working-directory: infra/examples/single-tool
        run: terraform test

      - name: Security scan (advisory)
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: infra
          soft_fail: true
