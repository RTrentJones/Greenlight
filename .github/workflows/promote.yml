name: promote

# Explicit, gated develop -> main fast-forward (greenlight-v1.md §12). Verify beta
# (the gate) -> fast-forward via the canPromote guard -> verify prod. Manual only.
# Activates fully once `develop` exists and Cloudflare creds are set (Phase 6/7).
on:
  workflow_dispatch:
    inputs:
      name:
        description: manifest entry to promote (blog or a tool name)
        required: true
        default: blog

permissions:
  contents: write
  issues: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v2

      - run: pnpm install --frozen-lockfile

      - name: Fetch branches
        run: git fetch --no-tags origin main develop

      - name: Check Cloudflare creds
        id: creds
        env:
          CF: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$CF" ]; then echo "have=1" >> "$GITHUB_OUTPUT"; else echo "have=0" >> "$GITHUB_OUTPUT"; fi

      - name: Verify beta (gate)
        if: steps.creds.outputs.have == '1'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: pnpm greenlight verify "${{ inputs.name }}" --env beta

      - name: Promote (gated fast-forward develop -> main)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          pnpm greenlight promote "${{ inputs.name }}" --perform --push

      - name: Verify prod
        if: steps.creds.outputs.have == '1'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: pnpm greenlight verify "${{ inputs.name }}" --env prod

  alert:
    needs: promote
    if: failure()
    uses: ./.github/workflows/alert.yml
    with:
      title: "promote failed"
