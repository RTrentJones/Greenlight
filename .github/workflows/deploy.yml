name: deploy

# Git-mapped envs (docs/archive/greenlight-v1.md §12): develop -> beta, main -> prod.
# Creds-guarded: without CLOUDFLARE_API_TOKEN the deploy/verify steps skip cleanly.
# (PR -> preview is intentionally not wired — Workers preview URLs aren't deterministic
# and verify --env preview throws by design; add it via Workers versions when needed.)
# Currently deploys the blog; multi-tool fan-out is a later refinement.
on:
  push:
    branches: [develop, main]

permissions:
  contents: read
  issues: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - run: pnpm install --frozen-lockfile

      - name: Resolve target env
        id: env
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "env=prod" >> "$GITHUB_OUTPUT"
          else
            echo "env=beta" >> "$GITHUB_OUTPUT"
          fi

      - name: Check Cloudflare creds
        id: creds
        env:
          CF: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$CF" ]; then echo "have=1" >> "$GITHUB_OUTPUT"; else echo "have=0" >> "$GITHUB_OUTPUT"; fi

      - name: Deploy + verify
        if: steps.creds.outputs.have == '1'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          pnpm greenlight deploy blog --env "${{ steps.env.outputs.env }}"
          pnpm greenlight verify blog --env "${{ steps.env.outputs.env }}"

      - name: Skip notice
        if: steps.creds.outputs.have != '1'
        run: echo "No CLOUDFLARE_API_TOKEN secret — deploy/verify skipped."

  alert:
    needs: deploy
    if: failure()
    uses: ./.github/workflows/alert.yml
    with:
      title: "deploy failed (${{ github.ref_name }})"
