# Agent Worker. `greenlight add` rewrites `name` + the route domain, and emits a
# .github/workflows/deploy-<name>.yml that (on push to main) resolves the account id + KV namespace,
# deploys, sets the GEMINI_API_KEY + RUN_TOKEN Worker secrets from GitHub secrets, seeds, and verifies.
# So you only add those two GitHub secrets — no manual wrangler, no local secrets.
name = "agent-tool"
# Non-secret account id. The emitted deploy workflow resolves it from your domain's zone in CI and
# fills this placeholder (wrangler can't call /memberships to auto-discover it with a scoped token).
account_id = "REPLACE_WITH_CLOUDFLARE_ACCOUNT_ID"
main = "src/index.ts"
compatibility_date = "2025-06-01"

# Daily 13:00 UTC — far under the Gemini free-tier quota (~1500 req/day). Edit to taste.
[triggers]
crons = ["0 13 * * *"]

[vars]
MODEL = "gemini-2.5-flash"
GREENLIGHT_ENV = "prod"

# Output store. `wrangler kv namespace create STATE` → paste the id here (and per-env below).
[[kv_namespaces]]
binding = "STATE"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# Named environments (the deploy uses `wrangler deploy --env prod|beta`). Wrangler envs do NOT
# inherit top-level config, so vars + kv + routes are repeated per env.
[env.prod]
name = "agent-tool"
routes = [{ pattern = "agent-tool.example.dev", custom_domain = true }]

[env.prod.vars]
MODEL = "gemini-2.5-flash"
GREENLIGHT_ENV = "prod"

[[env.prod.kv_namespaces]]
binding = "STATE"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[env.beta]
name = "agent-tool-beta"
routes = [{ pattern = "beta.agent-tool.example.dev", custom_domain = true }]

[env.beta.vars]
MODEL = "gemini-2.5-flash"
GREENLIGHT_ENV = "beta"

[[env.beta.kv_namespaces]]
binding = "STATE"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
